name: Deploy app to Pages

# Publishes ONLY the app files as a Pages artifact (privacy layer 1, 2026-07-04).
# The legacy branch-build served the entire repo — learner data (diagnostics/,
# progress/, archive/) was reachable at predictable URLs. This workflow stages
# an allowlist; everything else 404s. Repo data stays in git for cloud CC
# sessions — this only changes what Pages *serves*.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage app files (allowlist)
        run: |
          mkdir -p _site
          cp index.html mathsprint.html mathsprint.svg mathsprint.webmanifest icon-math-180.png sw.js manifest.json icon-192.png icon-512.png _site/
          cp -r ref _site/ref
          echo "Staged:" && find _site -type f | sort

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
