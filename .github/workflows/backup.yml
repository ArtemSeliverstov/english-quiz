name: Firestore backup

on:
  schedule:
    - cron: '0 3 * * *'   # Daily 03:00 UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Snapshot all players + exercises_library
        run: |
          DATE=$(date -u +%Y-%m-%d)
          node tools/backup_players.js

          # Sanity: backups/$DATE exists with 5 non-trivial player files
          if [ ! -d "backups/$DATE" ]; then echo "FAIL: backups/$DATE missing"; exit 1; fi
          for p in artem anna nicole ernest egor; do
            FILE="backups/$DATE/$p.json"
            if [ ! -f "$FILE" ]; then echo "FAIL: $FILE missing"; exit 1; fi
            BYTES=$(wc -c < "$FILE")
            if [ "$BYTES" -lt 1000 ]; then echo "FAIL: $FILE suspiciously small ($BYTES bytes)"; exit 1; fi
          done
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Push snapshot to the private backups repo
        # Privacy layer 2 (2026-07-04): snapshots contain full coach_sessions
        # transcripts — they live in the PRIVATE english-quiz-backups repo, not
        # on a branch of this public one. Write access via a repo-scoped deploy
        # key (BACKUPS_DEPLOY_KEY secret). Layout preserved: backups/YYYY-MM-DD/.
        env:
          DEPLOY_KEY: ${{ secrets.BACKUPS_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/backup_key
          chmod 600 ~/.ssh/backup_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/backup_key -o IdentitiesOnly=yes"

          git clone --depth 1 git@github.com:ArtemSeliverstov/english-quiz-backups.git /tmp/bk
          cd /tmp/bk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Same-day re-run guard: replace, never nest (bug-log 2026-07-03).
          rm -rf "backups/$DATE"
          mkdir -p backups
          cp -r "$GITHUB_WORKSPACE/backups/$DATE" "backups/$DATE"

          git add -A "backups/$DATE"
          if git diff --cached --quiet; then
            echo "No changes to commit (already backed up today?)"
            exit 0
          fi
          git commit -m "backup: $DATE"

          # Retention: keep 90 dailies, then first-of-month only.
          CUTOFF=$(date -u -d '90 days ago' +%Y-%m-%d)
          PRUNED=0
          for d in backups/*/; do
            D=$(basename "$d")
            if [[ "$D" < "$CUTOFF" && "${D:8:2}" != "01" ]]; then
              git rm -rq "$d" && PRUNED=$((PRUNED+1))
            fi
          done
          if [ "$PRUNED" -gt 0 ]; then
            git commit -m "backup: prune $PRUNED dailies older than $CUTOFF (keep first-of-month)"
          fi

          git push origin main
