name: Firestore backup

on:
  schedule:
    - cron: '0 3 * * *'   # Daily 03:00 UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Snapshot all players (doc + exercises + coach_sessions)
        run: |
          DATE=$(date -u +%Y-%m-%d)
          node tools/backup_players.js

          # Sanity: backups/$DATE exists with 5 non-trivial player files
          if [ ! -d "backups/$DATE" ]; then echo "FAIL: backups/$DATE missing"; exit 1; fi
          for p in artem anna nicole ernest egor; do
            FILE="backups/$DATE/$p.json"
            if [ ! -f "$FILE" ]; then echo "FAIL: $FILE missing"; exit 1; fi
            BYTES=$(wc -c < "$FILE")
            if [ "$BYTES" -lt 1000 ]; then echo "FAIL: $FILE suspiciously small ($BYTES bytes)"; exit 1; fi
          done
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Commit to backups branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash today's snapshot before switching branches — backups/ is
          # gitignored on main, so files survive checkout, but we move them
          # aside to avoid path collisions if the backups branch already
          # contains a backups/ directory in the old (YYYY/MM) layout.
          mv "backups/$DATE" "/tmp/snapshot-$DATE"
          rmdir backups 2>/dev/null || true

          if git ls-remote --exit-code --heads origin backups >/dev/null 2>&1; then
            git fetch origin backups:backups
            git checkout backups
          else
            git checkout --orphan backups
            git rm -rf . 2>/dev/null || true
            echo "# Firestore backups" > README.md
            echo "" >> README.md
            echo "Daily snapshots of \`players/*\` from Firestore (player doc + \`exercises\` + \`coach_sessions\` subcollections). Generated by \`.github/workflows/backup.yml\`. One file per player per day at \`backups/YYYY-MM-DD/{player}.json\`." >> README.md
            git add README.md
          fi

          mkdir -p backups
          mv "/tmp/snapshot-$DATE" "backups/$DATE"

          git add "backups/$DATE"
          if git diff --cached --quiet; then
            echo "No changes to commit (already backed up today?)"
            exit 0
          fi
          git commit -m "backup: $DATE"
          git push origin backups
