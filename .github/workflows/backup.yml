name: Firestore backup

on:
  schedule:
    - cron: '0 3 * * 1'   # Monday 03:00 UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Snapshot all players
        run: |
          mkdir -p /tmp/backup
          DATE=$(date -u +%Y-%m-%d)
          node tools/get_all_players.js > /tmp/backup/players-$DATE.json

          # Sanity: file is non-empty and has all 5 player keys
          BYTES=$(wc -c < /tmp/backup/players-$DATE.json)
          if [ "$BYTES" -lt 100 ]; then
            echo "FAIL: backup file suspiciously small ($BYTES bytes)"; exit 1
          fi
          for p in artem anna nicole ernest egor; do
            grep -q "\"$p\"" /tmp/backup/players-$DATE.json || { echo "FAIL: $p missing"; exit 1; }
          done
          echo "DATE=$DATE" >> $GITHUB_ENV

      - name: Commit to backups branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin backups >/dev/null 2>&1; then
            git fetch origin backups:backups
            git checkout backups
          else
            git checkout --orphan backups
            git rm -rf . 2>/dev/null || true
            echo "# Firestore backups" > README.md
            echo "" >> README.md
            echo "Weekly snapshots of \`players/*\` from Firestore. Generated by .github/workflows/backup.yml." >> README.md
            git add README.md
          fi

          MONTH_DIR=$(date -u +%Y/%m)
          mkdir -p "$MONTH_DIR"
          cp "/tmp/backup/players-$DATE.json" "$MONTH_DIR/players-$DATE.json"

          git add "$MONTH_DIR/players-$DATE.json"
          if git diff --cached --quiet; then
            echo "No changes to commit (already backed up today?)"
            exit 0
          fi
          git commit -m "backup: $DATE"
          git push origin backups
